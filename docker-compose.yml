version: "3.9"

# Local full-stack reference/testing setup. Not what runs the automated test
# suite (that uses the host Postgres install per backend/.env) — this is for
# verifying the Docker images build and run correctly together, and as a
# starting point for a single-droplet DigitalOcean deployment.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: callroster_app
      POSTGRES_PASSWORD: callroster_app_dev_pw
      POSTGRES_DB: callroster_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+psycopg2://callroster_app:callroster_app_dev_pw@postgres:5432/callroster_dev
      TEST_DATABASE_URL: postgresql+psycopg2://callroster_app:callroster_app_dev_pw@postgres:5432/callroster_dev
      JWT_SECRET_KEY: local-docker-compose-secret-change-me
      CORS_ALLOWED_ORIGINS: http://localhost:8080
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
